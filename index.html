<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Radio Sevilla</title>
  <meta name="theme-color" content="#0a0a0f">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Radio">
  <link rel="manifest" id="pwa-manifest">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root{
      --bg:#0a0a0f;--surface:#111118;--card:#16161f;--border:#252535;
      --accent:#e8ff47;--adim:rgba(232,255,71,.12);
      --text:#f0f0ff;--muted:#55556a;--r:20px;
    }
    *{box-sizing:border-box;margin:0;padding:0}
    body{
      font-family:'Syne',sans-serif;background:var(--bg);color:var(--text);
      min-height:100vh;display:flex;flex-direction:column;align-items:center;
      padding:20px 14px 48px;overflow-x:hidden;
    }
    body::before{
      content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
      background:
        radial-gradient(ellipse 70% 40% at 50% -10%,rgba(232,255,71,.07) 0%,transparent 70%),
        radial-gradient(ellipse 50% 30% at 80% 80%,rgba(71,208,255,.04) 0%,transparent 60%);
    }
    .app{width:100%;max-width:420px;position:relative;z-index:1}

    /* BANNER */
    #banner{
      display:none;background:linear-gradient(135deg,#e8ff47,#b3ff00);
      color:#0a0a0f;border-radius:14px;padding:12px 14px;margin-bottom:18px;
      align-items:center;gap:10px;animation:slideDown .35s ease;
    }
    #banner.on{display:flex}
    #banner .bt{flex:1}
    #banner .bt strong{display:block;font-size:.85rem;font-weight:800}
    #banner .bt span{font-size:.72rem;opacity:.65}
    #ibtn{background:#0a0a0f;color:var(--accent);border:none;border-radius:9px;padding:7px 13px;font-family:'Space Mono',monospace;font-size:.72rem;font-weight:700;cursor:pointer;white-space:nowrap;flex-shrink:0}
    #xbtn{background:none;border:none;color:rgba(0,0,0,.45);font-size:1rem;cursor:pointer;padding:2px 4px;flex-shrink:0}
    @keyframes slideDown{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:translateY(0)}}

    /* HEADER */
    header{text-align:center;margin-bottom:22px}
    .tag{display:inline-block;background:var(--card);border:1px solid var(--border);border-radius:100px;padding:3px 12px;font-family:'Space Mono',monospace;font-size:.6rem;color:var(--muted);letter-spacing:2px;text-transform:uppercase;margin-bottom:8px}
    header h1{font-size:2.5rem;font-weight:800;letter-spacing:-1.5px;line-height:1}
    header h1 em{font-style:normal;color:var(--accent)}

    /* CARD */
    .card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;margin-bottom:14px}

    /* VIZ */
    .viz{position:relative;background:#09090e;height:120px;overflow:hidden}
    #cv{width:100%;height:100%;display:block}
    .idle{position:absolute;inset:0;display:flex;align-items:flex-end;justify-content:center;gap:3px;padding-bottom:8px;pointer-events:none;opacity:1;transition:opacity .5s}
    .idle.off{opacity:0}
    .ibar{width:3px;border-radius:2px 2px 0 0;background:linear-gradient(to top,var(--accent),transparent);animation:ip var(--d) ease-in-out infinite;animation-delay:var(--dl)}
    @keyframes ip{0%,100%{height:5px;opacity:.2}50%{height:var(--h);opacity:.55}}
    .artWrap{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;pointer-events:none}
    #art{width:70px;height:70px;border-radius:14px;background:#1a1a25;border:1px solid var(--border);object-fit:contain;padding:6px;box-shadow:0 4px 28px rgba(0,0,0,.8);transition:border-radius .6s,box-shadow .4s}
    #art.spin{animation:artSpin 10s linear infinite;border-radius:50%!important;box-shadow:0 4px 28px rgba(232,255,71,.15),0 0 0 2px rgba(232,255,71,.15)}
    @keyframes artSpin{from{transform:rotate(0)}to{transform:rotate(360deg)}}

    /* CONTROLS */
    .ctrl{padding:18px 18px 16px}
    .irow{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;gap:8px}
    .sname{font-size:1rem;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:215px}
    .live{display:flex;align-items:center;gap:5px;background:var(--adim);border:1px solid rgba(232,255,71,.2);border-radius:100px;padding:3px 9px;font-family:'Space Mono',monospace;font-size:.58rem;color:var(--accent);letter-spacing:1px;opacity:0;transition:opacity .35s;flex-shrink:0}
    .live.on{opacity:1}
    .ldot{width:6px;height:6px;border-radius:50%;background:var(--accent);animation:blink 1.1s ease-in-out infinite}
    @keyframes blink{0%,100%{opacity:1}50%{opacity:.1}}

    .selw{position:relative;margin-bottom:14px}
    .selw::after{content:'▾';position:absolute;right:13px;top:50%;transform:translateY(-50%);color:var(--muted);pointer-events:none}
    select{width:100%;padding:12px 36px 12px 14px;background:var(--surface);color:var(--text);border:1px solid var(--border);border-radius:12px;font-family:'Syne',sans-serif;font-size:.88rem;cursor:pointer;appearance:none;outline:none;transition:border-color .2s}
    select:focus{border-color:var(--accent)}
    option{background:#1a1a26}

    .prow{display:flex;align-items:center;gap:12px}
    .pbtn{width:58px;height:58px;border-radius:50%;border:none;cursor:pointer;flex-shrink:0;background:var(--accent);color:#0a0a0f;font-size:1.35rem;display:flex;align-items:center;justify-content:center;transition:transform .15s;position:relative;overflow:visible}
    .pbtn:active{transform:scale(.93)}
    .pbtn.playing{animation:pp 2s ease-in-out infinite}
    .pbtn.loading{background:#1e1e2a;animation:none}
    .pbtn.loading::after{content:'';position:absolute;inset:6px;border:2px solid rgba(232,255,71,.15);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite}
    .pbtn.loading .pi{opacity:0}
    @keyframes pp{0%,100%{box-shadow:0 0 0 0 rgba(232,255,71,.45)}50%{box-shadow:0 0 0 15px rgba(232,255,71,0)}}
    @keyframes spin{to{transform:rotate(360deg)}}
    .pi{transition:opacity .15s}

    .vw{flex:1;display:flex;flex-direction:column;gap:6px}
    .vl{font-family:'Space Mono',monospace;font-size:.58rem;color:var(--muted);letter-spacing:1px;text-transform:uppercase;display:flex;justify-content:space-between}
    input[type=range]{-webkit-appearance:none;width:100%;height:4px;border-radius:2px;background:var(--border);outline:none;cursor:pointer}
    input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:15px;height:15px;border-radius:50%;background:var(--accent);cursor:pointer;box-shadow:0 0 8px rgba(232,255,71,.4)}

    .fbtn{width:46px;height:46px;border-radius:12px;border:1px solid var(--border);background:var(--surface);color:var(--muted);font-size:1.15rem;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .2s}
    .fbtn:hover{border-color:#f1c40f;color:#f1c40f}
    .fbtn.saved{border-color:#f1c40f;background:rgba(241,196,15,.1);color:#f1c40f}

    /* STATUS */
    .sbar{padding:0 18px 14px;font-family:'Space Mono',monospace;font-size:.6rem;color:var(--muted);letter-spacing:1px;min-height:22px;transition:color .3s}
    .sbar.err{color:#ff6b6b}
    .sbar.ok{color:var(--accent)}

    /* FAVS */
    .fcard{background:var(--card);border:1px solid var(--border);border-radius:var(--r);overflow:hidden}
    .fhead{padding:13px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
    .fhead span{font-family:'Space Mono',monospace;font-size:.62rem;color:var(--muted);letter-spacing:2px;text-transform:uppercase}
    .fbadge{background:var(--adim);border-radius:100px;padding:2px 8px;font-family:'Space Mono',monospace;font-size:.58rem;color:var(--accent)}
    .flist{padding:8px;max-height:240px;overflow-y:auto}
    .flist:empty::after{content:'Guarda tus emisoras favoritas con ☆';display:block;text-align:center;color:var(--muted);font-size:.78rem;padding:18px 8px}
    .flist::-webkit-scrollbar{width:3px}
    .flist::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
    .fi{display:flex;align-items:center;gap:10px;padding:9px 10px;border-radius:10px;cursor:pointer;transition:background .15s}
    .fi:hover{background:var(--surface)}
    .fi.active{background:var(--adim)}
    .flogo{width:36px;height:36px;border-radius:9px;background:#1a1a26;border:1px solid var(--border);object-fit:contain;padding:4px;flex-shrink:0}
    .fph{width:36px;height:36px;border-radius:9px;background:#1a1a26;border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:1.1rem;flex-shrink:0}
    .fn{flex:1;font-size:.85rem;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .fi.active .fn{color:var(--accent)}
    .fdel{color:var(--muted);font-size:.75rem;padding:4px 8px;border-radius:6px;transition:all .15s;flex-shrink:0}
    .fdel:hover{color:#ff6b6b;background:rgba(255,107,107,.1)}
  </style>
</head>
<body>
<div class="app">

  <div id="banner">
    <span>📲</span>
    <div class="bt"><strong>Instalar Radio Sevilla</strong><span>Añadir a pantalla de inicio</span></div>
    <button id="ibtn">Instalar</button>
    <button id="xbtn">✕</button>
  </div>

  <header>
    <div class="tag">📻 en directo</div>
    <h1>Radio<em>.</em></h1>
  </header>

  <div class="card">
    <div class="viz">
      <canvas id="cv"></canvas>
      <div class="idle" id="idle"></div>
      <div class="artWrap"><img id="art" src="" alt=""></div>
    </div>
    <div class="ctrl">
      <div class="irow">
        <div class="sname" id="sname">— Elige una emisora —</div>
        <div class="live" id="lp"><span class="ldot"></span>EN VIVO</div>
      </div>
      <div class="selw">
        <select id="sel">
          <option value="">— Seleccionar emisora —</option>
          <option value="csrsev"   data-logo="https://cdn.radioesp.com/espana/canalsur1.jpg"       data-name="Canal Sur Sevilla">Canal Sur Sevilla</option>
          <option value="csr"      data-logo="https://cdn.radioesp.com/espana/canalsurradio1.jpg"  data-name="Canal Sur Radio">Canal Sur Radio</option>
          <option value="cfr"      data-logo="https://cdn.radioesp.com/espana/canalsurfiesta1.jpg" data-name="Canal Fiesta Radio">Canal Fiesta Radio</option>
          <option value="ser"      data-logo="https://cdn.radioesp.com/espana/cadenaser.jpg"       data-name="Cadena SER">Cadena SER</option>
          <option value="cope"     data-logo="https://cdn.radioesp.com/espana/cope.jpg"            data-name="COPE">COPE</option>
          <option value="ondacero" data-logo="https://cdn.radioesp.com/espana/ondacero.jpg"        data-name="Onda Cero">Onda Cero</option>
          <option value="radiole"  data-logo="https://cdn.radioesp.com/espana/radiole.jpg"         data-name="Radiolé">Radiolé</option>
          <option value="los40"    data-logo="https://cdn.radioesp.com/espana/los40nuevo.jpg"      data-name="Los 40">Los 40</option>
          <option value="europafm" data-logo="https://cdn.radioesp.com/espana/europafm2.jpg"       data-name="Europa FM">Europa FM</option>
      
          <option value="megastar" data-logo="https://cdn.radioesp.com/espana/megastarsevilla.jpg" data-name="MegaStar FM">MegaStar FM</option>
           <option value="gosadera" data-logo="https://cdn.radioesp.com/espana/megastarsevilla.jpg" data-name="Gozadera FM">Gozadera FM</option>
            
    
 
        </select>
      </div>
      <div class="prow">
        <button class="pbtn" id="pb" onclick="togglePlay()"><span class="pi" id="pi">▶</span></button>
        <div class="vw">
          <div class="vl"><span>Volumen</span><span id="vpct">80%</span></div>
          <input type="range" id="vol" min="0" max="1" step="0.02" value="0.8">
        </div>
        <button class="fbtn" id="fvbtn" onclick="toggleFav()">☆</button>
      </div>
    </div>
    <div class="sbar" id="sb">Selecciona una emisora para comenzar</div>
  </div>

  <div class="fcard">
    <div class="fhead">
      <span>Mis favoritos</span>
      <span class="fbadge" id="fcnt">0</span>
    </div>
    <div class="flist" id="flist"></div>
  </div>
</div>

<!-- El audio NO tiene crossOrigin aquí: se lo ponemos dinámicamente en JS -->
<audio id="audio"></audio>

<script>
// ─── STREAMS ──────────────────────────────────────────────────────────
const STREAMS = {
  csrsev:   'https://rtva-live-radio.flumotion.com/rtva/csrsev.mp3',
  csr:      'https://rtva-live-radio.flumotion.com/rtva/csr.mp3',
  cfr:      'https://rtva-live-radio.flumotion.com/rtva/cfr.mp3',
  
  ser:      'https://playerservices.streamtheworld.com/api/livestream-redirect/CADENASER.mp3',
  cope:     'https://wecast-bl03.flumotion.com/copesedes/sevilla.mp3',
  ondacero: 'https://atres-live.ondacero.es/live/delegaciones/oc/sevilla/bitrate_1.m3u8',
  radiole:  'https://playerservices.streamtheworld.com/api/livestream-redirect/RADIOLE.mp3',
  los40:    'https://playerservices.streamtheworld.com/api/livestream-redirect/Los40.mp3',
  europafm: 'https://str1.mediatelekom.net:9950/stream',

  
  megastar: 'https://megastar-cope-rrcast.flumotion.com/cope/megastar.mp3',
  gosadera: 'https://azura.abcorp.es/listen/gozadera_en_directo/live',
  
  
  
};

// ─── PWA MANIFEST ─────────────────────────────────────────────────────
(()=>{
  const m={name:'Radio Sevilla',short_name:'Radio',start_url:'.',display:'standalone',
    background_color:'#0a0a0f',theme_color:'#0a0a0f',
    icons:[{src:"data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='20' fill='%230a0a0f'/%3E%3Ctext y='.9em' font-size='80' x='10'%3E%F0%9F%93%BB%3C/text%3E%3C/svg%3E",sizes:'192x192',type:'image/svg+xml'}]};
  document.getElementById('pwa-manifest').href=URL.createObjectURL(new Blob([JSON.stringify(m)],{type:'application/json'}));
})();

// ─── PWA INSTALL ──────────────────────────────────────────────────────
let dP=null;
window.addEventListener('beforeinstallprompt',e=>{e.preventDefault();dP=e;banner.classList.add('on')});
ibtn.onclick=async()=>{if(!dP)return;dP.prompt();await dP.userChoice;dP=null;banner.classList.remove('on')};
xbtn.onclick=()=>banner.classList.remove('on');
window.addEventListener('appinstalled',()=>banner.classList.remove('on'));

// ─── IDLE BARS ────────────────────────────────────────────────────────
(()=>{
  for(let i=0;i<46;i++){
    const b=document.createElement('div');b.className='ibar';
    b.style.cssText=`--h:${8+Math.random()*54}px;--d:${1+Math.random()*1.5}s;--dl:${Math.random()*1.7}s`;
    idle.appendChild(b);
  }
})();

// ─── CANVAS VISUALIZER ────────────────────────────────────────────────
const canvas=document.getElementById('cv'), vc=canvas.getContext('2d');
function rsz(){
  canvas.width=canvas.offsetWidth*(devicePixelRatio||1);
  canvas.height=canvas.offsetHeight*(devicePixelRatio||1);
}
window.addEventListener('resize',rsz); rsz();

let analyser=null, isPlaying=false;

(function loop(){
  requestAnimationFrame(loop);
  const W=canvas.width, H=canvas.height;
  vc.clearRect(0,0,W,H);
  if(!analyser||!isPlaying) return;
  const buf=analyser.frequencyBinCount, d=new Uint8Array(buf);
  analyser.getByteFrequencyData(d);
  const bw=(W/buf)*2.4; let x=0;
  for(let i=0;i<buf;i++){
    const v=d[i]/255; if(v<.02){x+=bw+1;continue;}
    const bh=v*H*.9, hue=55+(1-v)*170;
    vc.fillStyle=`hsla(${hue},80%,${44+v*28}%,${.5+v*.5})`;
    const r=Math.min(bw/2,3);
    vc.beginPath();
    if(vc.roundRect) vc.roundRect(x,H-bh,bw-1,bh,[r,r,0,0]);
    else vc.rect(x,H-bh,bw-1,bh);
    vc.fill();
    vc.fillStyle=`hsla(${hue},80%,${44+v*28}%,${v*.1})`;
    vc.beginPath();
    if(vc.roundRect) vc.roundRect(x,H,bw-1,-bh*.25,[0,0,r,r]);
    else vc.rect(x,H,bw-1,-bh*.25);
    vc.fill();
    x+=bw+1;
  }
})();

// ─── AUDIO + AUDIOCONTEXT ─────────────────────────────────────────────
const audio = document.getElementById('audio');
let audioCtx=null, srcNode=null;

function connectVisualizer() {
  // Intento conectar el visualizador. Si falla (CORS), el audio sigue sonando.
  try {
    if (!audioCtx) {
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      analyser = audioCtx.createAnalyser();
      analyser.fftSize = 256;
      analyser.smoothingTimeConstant = 0.83;
    }
    // Reconectar source si la instancia de audio cambió
    if (!srcNode) {
      srcNode = audioCtx.createMediaElementSource(audio);
      srcNode.connect(analyser);
      analyser.connect(audioCtx.destination);
    }
    if (audioCtx.state === 'suspended') audioCtx.resume();
  } catch(e) {
    // El visualizador no funcionará pero el audio sí
    console.warn('Visualizer no disponible para esta emisora:', e.message);
    analyser = null;
  }
}

// Volumen
audio.volume = 0.8;
vol.addEventListener('input', function(){
  audio.volume = this.value;
  vpct.textContent = Math.round(this.value*100)+'%';
});

// ─── ESTADO ───────────────────────────────────────────────────────────
let curKey='', curMeta=null;
const PH = "data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='12' fill='%23111118'/%3E%3Ctext y='.9em' font-size='48' x='8'%3E%F0%9F%93%BB%3C/text%3E%3C/svg%3E";
art.src = PH;
art.onerror = () => { art.onerror=null; art.src=PH; };

function getMeta(key){
  for(const o of sel.options) if(o.value===key) return {name:o.dataset.name||o.textContent.trim(), logo:o.dataset.logo||''};
  return {name:key, logo:''};
}
function setStatus(msg, cls=''){
  sb.textContent=msg; sb.className='sbar'+(cls?' '+cls:'');
}
function onPlayStart(){
  isPlaying=true;
  pb.className='pbtn playing'; pi.textContent='⏸';
  lp.classList.add('on'); idle.classList.add('off'); art.classList.add('spin');
  setStatus('▶ En directo','ok');
}
function onStop(){
  isPlaying=false;
  pb.className='pbtn'; pi.textContent='▶';
  lp.classList.remove('on'); idle.classList.remove('off'); art.classList.remove('spin');
}
function onError(msg='Error al conectar'){
  onStop(); setStatus(msg,'err');
}

// ─── CARGA DE EMISORA ─────────────────────────────────────────────────
function loadStation(key) {
  const url = STREAMS[key];
  if (!url) return;

  curKey = key;
  curMeta = getMeta(key);

  // Actualizar UI
  sname.textContent = curMeta.name;
  art.src = curMeta.logo || PH;
  art.classList.remove('spin');
  lp.classList.remove('on');
  idle.classList.remove('off');
  pb.className = 'pbtn loading';
  pi.textContent = '▶';
  isPlaying = false;
  setStatus('Conectando…');

  // KEY FIX 1: crossOrigin="anonymous" — permite al AudioContext
  // leer los datos del stream para el visualizador.
  // Debe ponerse ANTES de asignar .src
  audio.crossOrigin = 'anonymous';

  // KEY FIX 2: Limpiar completamente el buffer anterior
  // evita que un cambio rápido deje el audio "colgado"
  audio.pause();
  audio.removeAttribute('src');
  audio.load();

  // Ahora asignar nueva fuente y reproducir
  audio.src = url;
  audio.load();

  // Conectar visualizador (en try/catch: si falla el CORS no rompe el audio)
  connectVisualizer();

  audio.play()
    .then(onPlayStart)
    .catch(err => {
      console.warn('play() error:', err);
      // Si falla con crossOrigin, intentar sin él (el visualizador no funcionará)
      audio.crossOrigin = '';
      audio.src = url;
      audio.load();
      audio.play()
        .then(() => {
          analyser = null; // sin visualizador
          onPlayStart();
          setStatus('▶ En directo (sin visualizador)','ok');
        })
        .catch(e2 => {
          console.error('play() fallback error:', e2);
          onError('No se puede conectar a esta emisora');
        });
    });

  updateFavBtn();
}

// ─── PLAY / PAUSA ─────────────────────────────────────────────────────
function togglePlay() {
  if (!curKey) {
    if (sel.value) loadStation(sel.value);
    return;
  }
  if (isPlaying) {
    audio.pause();
    onStop();
    setStatus('Pausado');
  } else {
    pb.className = 'pbtn loading';
    setStatus('Conectando…');
    if (audioCtx?.state === 'suspended') audioCtx.resume();
    audio.play()
      .then(onPlayStart)
      .catch(e => { console.warn(e); onError('Error al reanudar'); });
  }
}

sel.addEventListener('change', function(){ if(this.value) loadStation(this.value); });

audio.addEventListener('waiting',  () => { if(isPlaying) pb.className='pbtn loading'; });
audio.addEventListener('playing',  () => { if(isPlaying){ pb.className='pbtn playing'; idle.classList.add('off'); art.classList.add('spin'); }});
audio.addEventListener('error',    () => { if(pb.classList.contains('loading')) onError('Error de conexión'); });
audio.addEventListener('stalled',  () => { if(isPlaying) pb.className='pbtn loading'; });

// ─── FAVORITOS ────────────────────────────────────────────────────────
let favs = JSON.parse(localStorage.getItem('radioFavs5')||'[]');

function toggleFav(){
  if(!curKey) return;
  const i = favs.findIndex(f=>f.key===curKey);
  if(i===-1) favs.push({key:curKey, ...curMeta});
  else favs.splice(i,1);
  localStorage.setItem('radioFavs5', JSON.stringify(favs));
  updateFavBtn(); renderFavs();
}
function updateFavBtn(){
  const s = favs.some(f=>f.key===curKey);
  fvbtn.textContent = s?'★':'☆';
  fvbtn.classList.toggle('saved', s);
}
function removeFav(i, e){
  e.stopPropagation();
  favs.splice(i,1);
  localStorage.setItem('radioFavs5', JSON.stringify(favs));
  updateFavBtn(); renderFavs();
}
function renderFavs(){
  flist.innerHTML=''; fcnt.textContent=favs.length;
  favs.forEach((f,i)=>{
    const d=document.createElement('div');
    d.className='fi'+(f.key===curKey?' active':'');
    const lg=f.logo
      ?`<img class="flogo" src="${f.logo}" alt="" onerror="this.outerHTML='<div class=fph>📻</div>'">`
      :`<div class="fph">📻</div>`;
    d.innerHTML=`${lg}<span class="fn">${f.name}</span><span class="fdel" onclick="removeFav(${i},event)">✕</span>`;
    d.addEventListener('click',()=>{ sel.value=f.key; loadStation(f.key); });
    flist.appendChild(d);
  });
}
renderFavs();

// ─── SERVICE WORKER ───────────────────────────────────────────────────
if('serviceWorker' in navigator){
  const sw=`self.addEventListener('install',()=>self.skipWaiting());self.addEventListener('activate',()=>clients.claim());`;
  navigator.serviceWorker.register(URL.createObjectURL(new Blob([sw],{type:'application/javascript'}))).catch(()=>{});
}
</script>
